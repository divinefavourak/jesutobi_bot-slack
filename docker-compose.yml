version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: slackos_db
    environment:
      POSTGRES_USER: slackos
      POSTGRES_PASSWORD: slackos123
      POSTGRES_DB: slackos
    ports:
      - "5432:5432"
    volumes:
      - slackos_data:/var/lib/postgresql/data

volumes:
  slackos_data: